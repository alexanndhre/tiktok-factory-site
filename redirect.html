<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Redirect - TikTok Factory Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; color: #1a1a2e; line-height: 1.6; }
  code { background: #f2f2f2; padding: 12px; display: block; word-break: break-all; border-radius: 8px; margin-top: 10px; }
  h1 { font-size: 1.3em; }
</style>
</head>
<body>
  <h1>Autorização recebida</h1>
  <p>Copie o valor abaixo (o "code") e cole no seu script de troca de token:</p>
  <code id="params">carregando...</code>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    document.getElementById("params").textContent =
      code ? `code=${code}` + (state ? `\nstate=${state}` : "") : "Nenhum código encontrado na URL.";
  </script>
</body>
</html>
